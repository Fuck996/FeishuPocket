version: '3.9'
services:
  app:
    container_name: feishu-pocket
    image: ghcr.io/fuck996/feishu-pocket@sha256:3ee2655ea3a7001dac73594ab41cb21361ca60ca95662b21522c674ad38f1c5f
    restart: unless-stopped
    ports:
      - "${APP_PORT:-45174}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/store.json
      - TZ=${TZ:-Asia/Shanghai}
      - MENU_BRIDGE_BASE_URL=${MENU_BRIDGE_BASE_URL:-}
    volumes:
      # 数据持久化 - 避免每次更新都丢失
      - ./data:/app/data
      # 配置文件目录 - 预留
      - ./config:/app/config
    networks:
      - feishu-network

volumes:
  data:
    driver: local
  config:
    driver: local

networks:
  feishu-network:
    driver: bridge

