version: '3.9'
services:
  app:
    container_name: feishu-pocket
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-fuck996}/feishu-pocket:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      JWT_SECRET: ${JWT_SECRET:-please-change-in-production}
      DATABASE_PATH: /app/data/store.json
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - feishu-pocket-data:/app/data
    ports:
      - "${APP_PORT:-45174}:3000"

volumes:
  feishu-pocket-data:
    driver: local
