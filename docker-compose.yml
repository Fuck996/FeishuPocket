version: '3.9'
services:
  app:
    container_name: feishu-pocket
    image: ghcr.io/${IMAGE_NAMESPACE:-Fuck996}/feishu-pocket:${IMAGE_TAG:-v0.2.1}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-45174}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_PATH=/app/data/store.json
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      # 数据持久化 - 避免每次更新都丢失
      - ./data:/app/data
      # 配置文件目录 - 预留
      - ./config:/app/config
    networks:
      - feishu-network

volumes:
  data:
    driver: local
  config:
    driver: local

networks:
  feishu-network:
    driver: bridge
