version: '3.9'
services:
  app:
    container_name: feishu-pocket
    image: ghcr.io/fuck996/feishu-pocket@sha256:8bd00a3b7c5c2d2c27ab4c38bc5610d1f2e81c48918b25729d8ae89b27e60b0a
    restart: unless-stopped
    ports:
      - "${APP_PORT:-45174}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/store.json
      - TZ=${TZ:-Asia/Shanghai}
      - MENU_BRIDGE_BASE_URL=${MENU_BRIDGE_BASE_URL:-}
    volumes:
      # 数据持久化 - 避免每次更新都丢失
      - ./data:/app/data
      # 配置文件目录 - 预留
      - ./config:/app/config
    networks:
      - feishu-network

volumes:
  data:
    driver: local
  config:
    driver: local

networks:
  feishu-network:
    driver: bridge

